services:
  web:
    image: php:8.2-apache
    ports:
      - "8080:80"
    volumes:
      - ./app:/var/www/html

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: campus_lost_found
    volumes:
      - ./db.sql:/docker-entrypoint-initdb.d/db.sql

  cache:
    image: redis:alpine
